version: "3.1"

rules:
  - rule: Say greeting
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Handle minor issue
    steps:
      - intent: minor_issue
      - action: utter_minor_issue

  - rule: Handle major issue
    steps:
      - intent: major_issue
      - action: utter_major_issue

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye